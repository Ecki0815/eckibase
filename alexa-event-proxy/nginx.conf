# External nginx configuration snippet for eckibase API
#
# Basic authentication is handled INSIDE the Docker nginx container.
# This external nginx is a plain reverse proxy only.
#
# 1. Replace server_name with your domain or IP.
# 2. Include this file from your main nginx.conf or sites-available, then reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name alexa-proxy.ecki-base.de;

    # Redirect all HTTP traffic to HTTPS.
    # Certbot's http-01 challenge also uses port 80, so this is fine –
    # certbot temporarily handles /.well-known/acme-challenge/ itself.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alexa-proxy.ecki-base.de;

    ssl_certificate     /etc/letsencrypt/live/alexa-proxy.ecki-base.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexa-proxy.ecki-base.de/privkey.pem;

    # Modern SSL settings (certbot --nginx also writes these, shown here for clarity)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS – tells browsers to use HTTPS for 6 months
    add_header Strict-Transport-Security "max-age=15768000" always;

    location /proxy/ {
        # Docker nginx container (handles basic auth internally)
        proxy_pass         http://127.0.0.1:1558/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
